name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests

      - name: Check test coverage
        run: python -m pytest --cov=budget --cov-report=term-missing --cov-fail-under=100 tests

      - name: Check cyclomatic complexity
        run: |
          python -m radon cc budget -s -n B
          python -m xenon --max-absolute B --max-modules B --max-average B budget

      - name: Run flake8
        run: python -m flake8 budget tests
